# Pulsar Configuration File
[settings]
trigger_distance = 60
theme = "Dark"
hover_scale = 1.35
springiness = 4
max_displacement = 20

# Global Switcher
[[switcher]]
slot = 1
label = "Chrome"
cmd = "chrome.exe"
process = "chrome"

[[switcher]]
slot = 2
label = "Notepad"
cmd = "notepad.exe"
process = "notepad"

[[switcher]]
slot = 8
label = "Explorer"
cmd = "explorer.exe"
process = "explorer"

# App Specific Profiles
[[profiles.chrome]]
slot = 1
label = "New Tab"
cmd = "^t"

[[profiles.chrome]]
slot = 2
label = "Close Tab"
cmd = "^w"

[[profiles.chrome]]
slot = 4
label = "Reopen"
cmd = "^+t"

